theme: just-the-docs
title: IoT Study Notes
description: MDM-4 Industrial IoT — Question Banks, Notes & Answers
baseurl: "/iot-sa"
url: "https://hashclash62.github.io"

# Navigation
nav_sort: case_insensitive

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s\-/]+/

# Footer
footer_content: "MDM-4 IoT Study Notes"

# Colour scheme
color_scheme: dark

# Callouts
callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

# Back to top
back_to_top: true
back_to_top_text: "Back to top"

# Plugins
plugins:
  - jekyll-seo-tag
