title: IoT Notes — TY Engineering, PCCOE
description: MDM-4 Industrial IoT — Study Notes by Unit
theme: minima

plugins:
  - jekyll-relative-links
  - jekyll-optional-front-matter
  - jekyll-readme-index
  - jekyll-default-layout
  - jekyll-titles-from-headings

relative_links:
  enabled: true
  collections: true

optional_front_matter:
  enabled: true

readme_index:
  enabled: true

titles_from_headings:
  enabled: true

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge

exclude:
  - agent-skill-generate-notes.md
  - unit1-questions.md
  - unit2-questions.md
  - unit3-questions.md
  - unit4-questions.md
  - Gemfile
  - Gemfile.lock

header_pages:
  - index.md
